<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMESSPOR PRO v21.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
 
    <style>
        /* MOBİL FONT AYARLARI */
@media (max-width: 768px) {
    body {
        font-size: 12px !important;
    }

    /* Ürün kartı resmi */
    .product-card img {
        width: 60px !important;
        height: 60px !important;
    }

    /* Fiyat grid 4lü tek satır - kompakt */
    .price-grid {
        grid-template-columns: repeat(4, 1fr) !important;
        gap: 3px !important;
    }

    .p-box {
        font-size: 9px !important;
        padding: 4px 1px !important;
        line-height: 1.2 !important;
    }
    .p-box b {
        font-size: 9px !important;
    }
    .p-box small {
        font-size: 8px !important;
        display: block !important;
    }

    .form-control, .form-select {
        font-size: 13px !important;
    }
    .input-mini {
        font-size: 12px !important;
    }

    .total-area span {
        font-size: 11px !important;
    }
    .total-area .fw-bold {
        font-size: 14px !important;
    }

    .sticky-action-buttons .btn {
        font-size: 10px !important;
        padding: 8px 2px !important;
    }

    .cart-item {
        padding: 10px !important;
    }
}
        /* İndirim Kutuları Renk ve Gölge Efektleri */
.p-box.liste { background-color: #f8fafc; border-color: #000000; color: #1e293b; }
.p-box.disc25 { background-color: #f0fdf4; border-color: #000000; color: #166534; } /* Yeşilimsi */
.p-box.disc30 { background-color: #fffaf2; border-color: #000000; color: #92400e; } /* Turuncumsu */
.p-box.disc35 { background-color: #fef2f2; border-color: #000000; color: #991b1b; } /* Kırmızımsı */
/* İndirim Kutuları Renk ve Yazı Ayarları */
.p-box.liste { 
    color: #000000; /* Yazıyı Siyah Yapar */
}
.p-box.disc25 { 
    color: #000000; /* Yazıyı Siyah Yapar */
}
.p-box.disc30 {  
    color: #000000; /* Yazıyı Siyah Yapar */
}
.p-box.disc35 {  
    color: #000000; /* Yazıyı Siyah Yapar */
}
.p-box:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
}
        :root { --primary: #2563eb; --bg: #f8fafc; --dark: #1e293b; --success: #76bc21; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg);
            letter-spacing: normal;
        }
 
        /* MASAÜSTÜ DÜZENİ */
        @media (min-width: 993px) {
            .main-row { display: flex !important; height: calc(100vh - 60px); }
            .panel { height: 100%; overflow-y: auto; padding: 15px; border-right: 1px solid #e2e8f0; }
            .left-panel { width: 38%; background: white; }
            .mid-panel { width: 38%; background: #f1f5f9; } 
            .archive-panel { width: 24%; background: #e2e8f0; }
            .mobile-nav { display: none !important; }
        }
 
        /* MOBİL DÜZENİ */
        @media (max-width: 992px) {
            .main-row { position: relative; height: calc(100vh - 125px); overflow: hidden; }
            .panel { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; padding: 15px; background: var(--bg); }
            .panel.active { display: block !important; }
            .mobile-nav { 
                display: flex !important; position: fixed; bottom: 0; left: 0; right: 0;
                height: 65px; background: var(--dark); justify-content: space-around; 
                align-items: center; z-index: 9999; border-top: 1px solid #334155;
            }
        }
 
        /* ÜRÜN KARTLARI & SEPET */
        .product-card { border-radius: 10px; transition: 0.2s; }
        .price-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .p-box { text-align: center; padding: 6px 2px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid #ddd; transition: 0.2s; }
        .p-box:active { transform: scale(0.95); }
        .cart-item { background: white; border: 1px solid #cbd5e1; border-radius: 12px; padding: 12px; margin-bottom: 10px; touch-action: pan-y; }
        .cart-item.dragging { opacity: 0.5; border: 2px solid var(--primary); }
        
        .mobile-nav button { background: none; border: none; color: #94a3b8; font-size: 11px; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .mobile-nav button.active { color: white; background: rgba(255,255,255,0.1); }
        .mobile-nav i { font-size: 20px; }
 
        .total-area { background: var(--dark); color: white; border-radius: 12px; padding: 15px; }
        .input-mini { border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        .input-mini { 
    border: 1px solid #ccc; 
    border-radius: 6px; 
    text-align: center; 
    width: 65px !important;  /* Genişlik */
    height: 35px !important; /* Yükseklik */
    font-size: 13px !important; /* İŞTE BURASI! Sayıları büyütür */
    font-weight: bold;        /* İstersen kalın da yapabilirsin */
    background-color: white;
}
/* Arama ve Navigasyon Bölümünü Sabitle */
.nav-tabs, .header-container, #search-area {
    position: sticky;
    top: 0;
    background: white;
    z-index: 1000;
    padding: 10px 0;
}
 
/* Sayfanın sağa kaymasını kökten engelle */
html, body {
    max-width: 100%;
    overflow-x: hidden;
}
/* Mobil Alt Panel Düzenlemesi */
@media (max-width: 768px) {
    #summaryArea {
        position: sticky;
        bottom: 70px; /* Alt menü barının (tab-bar) hemen üzerinde durması için */
        background: #fff;
        padding: 15px !important;
        border-top: 2px solid #eee;
        z-index: 999;
        margin-left: -15px; /* Panel padding'ini sıfırlayıp tam genişlik sağlamak için */
        margin-right: -15px;
        box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
    }
 
    /* Butonların mobilde daha kolay basılması için yükseklik ayarı */
    #summaryArea .btn {
        padding: 10px 5px;
        font-size: 11px;
    }
 
    /* Liste sonuna boşluk ekle ki son ürün butonların altında kalmasın */
    #cartItems {
        padding-bottom: 120px; 
    }
}
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-2 py-2 sticky-top">
    <span class="navbar-brand fw-bold mb-0" style="font-size: 13px; white-space: nowrap;">IMESSPOR PRO</span>
    <div class="d-flex gap-1 align-items-center flex-wrap justify-content-end" style="flex:1; margin-left:8px;">
        <button class="btn btn-outline-success btn-sm px-2" title="Stok yükle" onclick="document.getElementById('excelInput').click()" style="font-size:11px;"><i class="bi bi-upload"></i> Stok</button>
        <input type="file" id="excelInput" style="display:none" accept=".xlsx,.xlsm" onchange="importXLSX(this)">
        <button class="btn btn-outline-warning btn-sm px-2" title="Görsel yükle" onclick="document.getElementById('gorselInput').click()" style="font-size:11px;"><i class="bi bi-image"></i> Görsel</button>
        <input type="file" id="gorselInput" style="display:none" accept=".csv" onchange="importGorselCSV(this)">
        <div id="kurGosterge" class="badge bg-success d-flex align-items-center" style="font-size: 9px; white-space: nowrap;">USD: --,-- ₺ | EUR: --,-- ₺</div>
        <button class="btn btn-outline-danger btn-sm px-2" onclick="clearCatalog()"><i class="bi bi-trash"></i></button>
    </div>
</nav>
 
<div class="main-row">
    <div id="tab-products" class="panel left-panel active">
        <input type="text" id="search" class="form-control mb-3" placeholder="Ürün veya Kod Ara..." oninput="debouncedSearch()">
        <div id="productList"></div>
    </div>
 
    <div id="tab-cart" class="panel mid-panel">
    <input type="text" id="customerName" class="form-control mb-3 fw-bold" placeholder="Müşteri/Şirket Adı">
    
    <div class="bg-light p-3 rounded border mb-3 shadow-sm">
        <div class="row g-2 align-items-end">
            <div class="col-4">
                <label class="small fw-bold mb-1">Toplu İndirim (%)</label>
                <input type="number" id="globalDiscountInput" class="form-control form-control-sm" placeholder="Toplu İndirim">
                <button class="btn btn-dark btn-sm w-100 mt-1 shadow-sm" onclick="applyGlobalDiscount()">
                    <i class="bi bi-percent me-1"></i>Uygula
                </button>
            </div>
 
            <div class="col-4">
                <label class="small fw-bold mb-1">Hedef Toplam</label>
                <input type="number" id="targetTotalInput" class="form-control form-control-sm" placeholder="Hedef Toplam">
                <button class="btn btn-primary btn-sm w-100 mt-1 shadow-sm" onclick="applyTargetTotal()">
                    <i class="bi bi-calculator me-1"></i>Hesapla
                </button>
            </div>
 
            <div class="col-4">
                <label class="small fw-bold mb-1">Teklif Para Birimi</label>
                <select id="currencySelect" class="form-select form-select-sm" onchange="updateUI()">
                    <option value="TL" selected>TL (₺)</option>
                    <option value="USD">USD ($)</option>
                    <option value="EUR">EURO (€)</option>
                </select>
                <div class="mt-1" style="height: 31px;"></div> 
            </div>
        </div>
    </div>
    <div id="cartItems" ondragover="initSortable(event)"></div>
        <div id="summaryArea" style="display:none">
            <div class="total-area mb-3"></div>
            <div class="d-flex gap-2">
                <button class="btn btn-success btn-sm fw-bold flex-fill" onclick="newQuote()">YENİ</button>
                <button class="btn btn-warning btn-sm fw-bold flex-fill" onclick="saveToArchive()">KAYDET</button>
                <button class="btn btn-info btn-sm fw-bold text-white" onclick="previewCurrentQuote()"><i class="bi bi-eye"></i></button>
                <button class="btn btn-primary btn-sm fw-bold flex-fill" onclick="generatePDF()">İNDİR</button>
            </div>
        </div>
    </div>
 
    <div id="tab-archive" class="panel archive-panel">
        <h6 class="fw-bold mb-3">GEÇMİŞ TEKLİFLER</h6>
        <div id="archiveList"></div>
    </div>
</div>
 
<div class="modal fade" id="previewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-white">
                <h5 class="modal-title fw-bold"><i class="bi bi-file-earmark-text me-2 text-primary"></i>TEKLİF ÖNİZLEME</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4" id="previewBody"></div>
            <div class="modal-footer border-0 bg-light">
                <button type="button" class="btn btn-dark fw-bold px-4" data-bs-dismiss="modal">KAPAT</button>
            </div>
        </div>
    </div>
</div>
 
<div class="mobile-nav">
    <button id="btn-prod" onclick="switchTab('products')" class="active"><i class="bi bi-grid"></i><span>Ürünler</span></button>
    <button id="btn-cart" onclick="switchTab('cart')"><i class="bi bi-cart3"></i><span>Teklif</span></button>
    <button id="btn-arch" onclick="switchTab('archive')"><i class="bi bi-archive"></i><span>Arşiv</span></button>
</div>
 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const trLower = (str) => str.replace(/İ/g, "i").replace(/I/g, "ı").toLowerCase();
    const f = (val) => new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(val);
    
    let products = (() => {
        const katalog = JSON.parse(localStorage.getItem('imes_katalog') || '[]');
        const gorselMap = JSON.parse(localStorage.getItem('imes_gorsel') || '{}');
        return katalog.map(p => ({ ...p, resim: gorselMap[p.kod] || '' }));
    })();
    let archive = JSON.parse(localStorage.getItem('imes_arsiv')) || [];
    let cart = [];
    let usdRate = 43.71;
let eurRate = 46.50; // Varsayılan (Kur çekilemezse diye)
 
async function getKur() {
    try { 
        const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD'); 
        const data = await res.json(); 
        usdRate = data.rates.TRY; 
        // Euro paritesini alıp TL'ye çeviriyoruz
        const eurUsdRatio = data.rates.EUR; 
        eurRate = usdRate / eurUsdRatio; 
    } catch(e){ console.log("Kurlar çekilemedi."); }
    
    document.getElementById('kurGosterge').innerHTML = `USD: ${f(usdRate)} ₺ | EUR: ${f(eurRate)} ₺`;
    renderProducts(); renderArchive();
}
 
    function switchTab(tabId) {
        if (window.innerWidth > 992) return;
        document.querySelectorAll('.panel').forEach(p => { p.classList.remove('active'); p.style.setProperty('display', 'none', 'important'); });
        const target = document.getElementById('tab-' + tabId);
        if (target) { target.classList.add('active'); target.style.setProperty('display', 'block', 'important'); }
        document.querySelectorAll('.mobile-nav button').forEach(b => b.classList.remove('active'));
        const btnId = tabId === 'products' ? 'btn-prod' : (tabId === 'cart' ? 'btn-cart' : 'btn-arch');
        document.getElementById(btnId).classList.add('active');
        window.scrollTo(0, 0);
    }
 
    // --- PERFORMANS OPTİMİZASYONU ---
    let _searchTimer = null;
    let _filteredProducts = [];
    const PAGE_SIZE = 30; // Her seferinde gösterilecek ürün sayısı
    let _currentPage = 0;

    function debouncedSearch() {
        clearTimeout(_searchTimer);
        _searchTimer = setTimeout(() => renderProducts(), 280);
    }

    function renderProducts() {
        const q = trLower(document.getElementById('search').value);
        _filteredProducts = products.filter(p =>
            trLower(p.kod||"").includes(q) || trLower(p.ad||"").includes(q)
        );
        _currentPage = 0;
        const list = document.getElementById('productList');
        list.innerHTML = '';
        _appendProductPage(list);
    }

    function _buildProductCard(p) {
        const isPanatta = (p.marka || '').includes('PANATTA');
        const getPriceHtml = (r) => isPanatta
            ? `<b>${f(p.fiyat * r * eurRate)} ₺</b><br><small style="font-size:14px;display:block;margin-top:2px;">€${f(p.fiyat * r)}</small>`
            : `<b>${f(p.fiyat * r * usdRate)} ₺</b><br><small style="font-size:14px;display:block;margin-top:2px;">$${f(p.fiyat * r)}</small>`;
        const stokRenk = (p.stok != null && p.stok >= 1) ? '#16a34a' : '#dc2626';
        return `<div class="product-card d-flex align-items-center gap-3 p-2 mb-2 border rounded bg-white">
            <img src="${p.resim || 'https://placehold.jp/100x100.png?text=YOK'}" loading="lazy"
                 style="width:80px;height:80px;object-fit:contain;border-radius:6px;background:#f1f5f9;">
            <div class="flex-grow-1">
                <div class="fw-bold mb-1" style="font-size:13px;">
                    <span class="badge bg-dark me-1">${p.kod}</span> ${p.ad}
                    <span style="font-size:12px;font-weight:600;color:${stokRenk};margin-left:4px;">(${p.stok != null ? p.stok : 0})</span>
                </div>
                <div class="price-grid">
                    <div class="p-box liste" onclick="addToCart('${p.kod}',0)">LİSTE<br>${getPriceHtml(1)}</div>
                    <div class="p-box disc25" onclick="addToCart('${p.kod}',25)">%25<br>${getPriceHtml(0.75)}</div>
                    <div class="p-box disc30" onclick="addToCart('${p.kod}',30)">%30<br>${getPriceHtml(0.7)}</div>
                    <div class="p-box disc35" onclick="addToCart('${p.kod}',35)">%35<br>${getPriceHtml(0.65)}</div>
                </div>
            </div>
        </div>`;
    }

    function _appendProductPage(list) {
        const start = _currentPage * PAGE_SIZE;
        const slice = _filteredProducts.slice(start, start + PAGE_SIZE);
        if (!slice.length) return;

        // Mevcut "Daha Fazla" butonunu kaldır
        const existingBtn = document.getElementById('loadMoreBtn');
        if (existingBtn) existingBtn.remove();

        const frag = document.createDocumentFragment();
        const wrapper = document.createElement('div');
        wrapper.innerHTML = slice.map(_buildProductCard).join('');
        while (wrapper.firstChild) frag.appendChild(wrapper.firstChild);
        list.appendChild(frag);

        _currentPage++;
        const totalShown = _currentPage * PAGE_SIZE;
        if (totalShown < _filteredProducts.length) {
            const btn = document.createElement('button');
            btn.id = 'loadMoreBtn';
            btn.className = 'btn btn-outline-secondary w-100 my-2';
            btn.style.fontSize = '13px';
            btn.textContent = `Daha Fazla Göster (${_filteredProducts.length - totalShown} ürün kaldı)`;
            btn.onclick = () => _appendProductPage(document.getElementById('productList'));
            list.appendChild(btn);
        }
    }
    // --- OPTİMİZASYON SONU ---
 
    function addToCart(kod, disc) {
        // Ürün zaten var mı kontrolü
        const isExist = cart.find(x => x.kod === kod);
        
        if (isExist) {
            // Eğer ürün varsa kullanıcıya kırmızı uyarı ver ve işlemi durdur
            showToast("⚠️ Bu ürün zaten teklif listenizde var!", "#ef4444");
            return; 
        }
 
        // Kataloğumuzdan ürünü buluyoruz
        const p = products.find(x => x.kod === kod);
        if(!p) return;
 
        // Ürün yoksa ekle
        cart.push({ 
            id: Date.now(), 
            kod: p.kod, 
            ad: p.ad, 
            marka: p.marka || '',
            isEur: (p.marka || '').includes('PANATTA'),
            discount: disc, 
            qty: 1, 
            baseUsd: p.fiyat, 
            resim: p.resim,
            manualPrice: null  // Elle girilen fiyat için yeni alan
        });
        
        updateUI(); 
        showToast("✔ Ürün Teklife Eklendi", "#10b981");
    }
 
    function updateUI() {
    const cartItems = document.getElementById('cartItems');
    const selectedCurr = document.getElementById('currencySelect').value;
    
    // Para birimi sembolü ve çarpanı belirleme
    const symbol = selectedCurr === 'TL' ? '₺' : (selectedCurr === 'USD' ? '$' : '€');
    
    // Ürün fiyatları USD olduğu için çarpanları ayarlıyoruz
    let rate = 1; 
    if (selectedCurr === 'TL') rate = usdRate;
    else if (selectedCurr === 'EUR') rate = usdRate / eurRate; // 1 USD kaç EURO eder? (Parite)
 
    cartItems.innerHTML = cart.map(item => {
        // PANATTA ise EUR bazlı, diğerleri USD bazlı
        let itemRate;
        if (selectedCurr === 'TL') {
            itemRate = item.isEur ? eurRate : usdRate;
        } else if (selectedCurr === 'EUR') {
            itemRate = item.isEur ? 1 : (usdRate / eurRate);
        } else { // USD
            itemRate = item.isEur ? (eurRate / usdRate) : 1;
        }
        const itemSymbol = selectedCurr !== 'TL' ? symbol : '₺';
        
        // Elle fiyat girilmişse onu kullan, yoksa hesaplanmış fiyatı kullan
        let displayUnitPrice;
        if (item.manualPrice !== null && item.manualPrice !== undefined) {
            displayUnitPrice = item.manualPrice;
        } else {
            const unitPriceUsd = item.baseUsd * (1 - item.discount / 100);
            displayUnitPrice = unitPriceUsd * itemRate;
        }
        
        const displayTotalRow = displayUnitPrice * item.qty;
 
        return `
    <div class="cart-item" draggable="true" ondragstart="this.classList.add('dragging')" ondragend="this.classList.remove('dragging')" data-id="${item.id}">
        <div class="d-flex align-items-start gap-2">
            <img src="${item.resim || ''}" style="width:46px; height:46px; object-fit:contain; border-radius:4px; flex-shrink:0;" onerror="this.src='https://via.placeholder.com/50'">
            
            <div class="flex-grow-1" style="min-width:0; overflow:hidden;">
                <!-- Üst satır: kod + ad + çöp -->
                <div class="d-flex align-items-center justify-content-between mb-1" style="gap:4px;">
                    <div style="min-width:0; flex:1; overflow:hidden; display:flex; align-items:center; gap:4px;">
                        <span class="badge bg-dark" style="font-size:10px; padding:3px 5px; flex-shrink:0;">${item.kod}</span>
                        <b style="font-size:12px; color:#000; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${item.ad}</b>
                    </div>
                    <i class="bi bi-trash text-danger" onclick="removeItem(${item.id})" style="cursor:pointer; font-size:1rem; flex-shrink:0;"></i>
                </div>
                <!-- Orta satır: İnd + Adet inputları -->
                <div class="d-flex align-items-center gap-1 mb-1">
                    <span style="font-size:10px;color:#666;white-space:nowrap;">İnd:</span>
                    <input type="number" step="0.00000001" class="input-mini" style="flex:1;min-width:0;height:24px;font-size:11px;" value="${item.discount}" onchange="updateItem(${item.id}, 'discount', this.value)">
                    <span style="font-size:10px;color:#666;">%</span>
                    <span style="font-size:10px;color:#666;white-space:nowrap;margin-left:4px;">Adet:</span>
                    <input type="number" class="input-mini" style="flex:1;min-width:0;height:24px;font-size:11px;" value="${item.qty}" onchange="updateItem(${item.id}, 'qty', this.value)">
                </div>
                <!-- Alt satır: Birim + Toplam -->
                <div class="d-flex align-items-center gap-1 bg-light px-2 py-1 rounded">
                    <span style="font-size:10px;color:#666;white-space:nowrap;">Birim:</span>
                    <input type="number" step="0.01" class="input-mini" style="flex:1;min-width:0;height:24px;font-size:11px;font-weight:600;text-align:right;" value="${displayUnitPrice.toFixed(2)}" onchange="updateManualPrice(${item.id}, this.value)">

    function updateManualPrice(id, val) {
        const i = cart.find(x => x.id == id);
        if(i) {
            const price = parseFloat(val);
            if (price && price > 0) {
                i.manualPrice = price;
                // Elle fiyat girildiğinde indirimi tersine hesapla
                const selectedCurr = document.getElementById('currencySelect').value;
                let itemRate;
                if (selectedCurr === 'TL') {
                    itemRate = i.isEur ? eurRate : usdRate;
                } else if (selectedCurr === 'EUR') {
                    itemRate = i.isEur ? 1 : (usdRate / eurRate);
                } else {
                    itemRate = i.isEur ? (eurRate / usdRate) : 1;
                }
                const listPrice = i.baseUsd * itemRate;
                const calculatedDiscount = ((listPrice - price) / listPrice) * 100;
                i.discount = Math.max(0, Math.min(100, calculatedDiscount)); // 0-100 arası sınırla
            } else {
                i.manualPrice = null; // Geçersiz değer girilirse otomatik hesaplamaya dön
            }
            updateUI();
        }
    }
 
    function updateItem(id, field, val) { 
        const i = cart.find(x => x.id == id); 
        if(i) { 
            if (field === 'discount') {
                i[field] = parseFloat(val) || 0;
                i.manualPrice = null; // İndirim değiştiğinde elle girilen fiyatı sıfırla
            } else {
                i[field] = parseFloat(val) || 0;
            }
            updateUI(); 
        } 
    }
    
    function removeItem(id) { cart = cart.filter(x => x.id != id); updateUI(); }
 
    function applyGlobalDiscount() {
        const disc = parseFloat(document.getElementById('globalDiscountInput').value);
        if (isNaN(disc)) return;
        cart.forEach(i => {
            i.discount = disc;
            i.manualPrice = null; // Toplu indirim uygulanırken elle girilen fiyatları sıfırla
        });
        updateUI();
    }

        "* Ürünlerimiz 2 yıl garantilidir.",
        "* Teklifimizin geçerlilik tarihi 3 (üç) gündür.",
        "* Döviz fiyatı verilen teklifler gün kuru üzerinden verilmiş olup, anlaşma yapıldığı gün merkez bankası kur fiyatı dikkate alınacaktır",
        "* Teklifimizi olumlu karşılamanızı ümit eder, iyi çalışmalar dileriz.",
        "* Bu teklif ve ekinde sunulan tüm bilgiler gizlilik şartı gereğince verildiği kurum için özel olarak hazırlanmış olup, sadece teklif verilen ",
        "  firmanın/kişinin kullanımına özeldir."
    ];
    terms.forEach((line, i) => {
        const lineY = termsY + 6 + (i * 4.5);
        doc.text(line, 15, lineY);
    });
 
    // İmza Alanı
    let signY = termsY + 6 + (terms.length * 4.5) + 10;
    if (signY > 260) {
        doc.addPage();
        signY = 30;
    }
    doc.text("Satıcı Onayı", 15, signY); doc.line(15, signY + 2, 60, signY + 2);
    doc.text("Müşteri Onayı", 135, signY); doc.line(135, signY + 2, 180, signY + 2);
 
    const fileName = `${customer.replace(/\s+/g, '_')}_Teklif.pdf`;
    const blob = doc.output('blob');
 
    // MOBİL PAYLAŞIM ÖZELLİĞİ
    if (navigator.share && /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
        const file = new File([blob], fileName, { type: 'application/pdf' });
        
        navigator.share({
            files: [file],
            title: fileName,
            text: `${customer} için hazırlanan teklif dosyası.`
        }).then(() => {
            showToast("Paylaşım başarılı!", "#10b981");
        }).catch((error) => {
            const url = URL.createObjectURL(blob);
            window.location.href = url;
        });
    } 
    else {
        doc.save(fileName);
    }
}
 
    function renderPreview(data) {
    const selectedCurr = document.getElementById('currencySelect').value;
    const symbol = selectedCurr === 'USD' ? '$' : (selectedCurr === 'EUR' ? '€' : '₺');
    
    let rate = 1; 
    if (selectedCurr === 'TL') rate = usdRate; 
    else if (selectedCurr === 'EUR') rate = usdRate / eurRate;
 
    let kdvHaricToplam = 0;
 
    let itemsHtml = data.items.map(i => {
        let unitPrice;
        if (i.manualPrice !== null && i.manualPrice !== undefined) {
            unitPrice = i.manualPrice;
        } else {
            let itemRate;
            if (selectedCurr === 'TL') {
                itemRate = i.isEur ? eurRate : usdRate;
            } else if (selectedCurr === 'EUR') {
                itemRate = i.isEur ? 1 : (usdRate / eurRate);
            } else {
                itemRate = i.isEur ? (eurRate / usdRate) : 1;
            }
            unitPrice = i.baseUsd * (1 - i.discount / 100) * itemRate;
        }
        
        const lineTotal = unitPrice * i.qty;
        kdvHaricToplam += lineTotal;
 
        return `
        <div class="d-flex align-items-center justify-content-between p-3 mb-2 border-bottom">
            <div class="d-flex align-items-center gap-3" style="flex: 2; min-width: 0;">
                <img src="${i.resim || ''}" style="width:60px; height:60px; object-fit:contain; border-radius:6px; background:#f8f9fa;" onerror="this.src='https://via.placeholder.com/60'">
                <div style="min-width: 0;">
                    <div class="d-flex align-items-center gap-2 mb-1">
                        <span class="badge bg-dark" style="font-size: 10px;">${i.kod}</span>
                        <b style="font-size:14px; color:#000; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${i.ad}</b>
                    </div>
                    <span style="font-size:12px; color:#888;">%${i.discount} İndirim</span>
                </div>
            </div>
            
            <div class="d-flex align-items-center text-end" style="flex: 3; justify-content: flex-end; gap: 30px;">
                <div style="min-width: 100px;">
                    <div style="font-size: 10px; color: #888; text-transform: uppercase;">Birim</div>
                    <span style="font-size: 14px; color: #000; font-weight: 500;">${f(unitPrice)} ${symbol}</span>
                </div>
                <div style="min-width: 60px;">
                    <div style="font-size: 10px; color: #888; text-transform: uppercase;">Adet</div>
                    <span style="font-size: 14px; color: #000; font-weight: 600;">${i.qty}</span>
                </div>
                <div style="min-width: 120px;">
                    <div style="font-size: 10px; color: #888; text-transform: uppercase;">Toplam</div>
                    <span style="font-size: 14px; color: #000; font-weight: 700;">${f(lineTotal)} ${symbol}</span>
                </div>
            </div>
        </div>`;
    }).join('');
 
    const kdvTutari = kdvHaricToplam * 0.20;
    const kdvDahilToplam = kdvHaricToplam + kdvTutari;
 
    let html = `
        <div class="p-3 bg-dark text-white rounded shadow-sm mb-4">
            <h5 class="mb-1">${data.customer.toUpperCase()}</h5>
            <small class="opacity-75"><i class="bi bi-calendar3 me-1"></i>${data.date} | Para Birimi: ${selectedCurr}</small>
        </div>
        
        <div class="preview-items">
            ${itemsHtml}
        </div>
        
        <div class="mt-4 p-3 bg-light rounded shadow-sm">
            <div class="d-flex justify-content-end align-items-center mb-1">
                <span style="font-size: 14px; color: #666; margin-right: 15px;">Ara Toplam (KDV Hariç):</span>
                <span style="font-size: 16px; color: #000; font-weight: 500; min-width: 120px; text-align: right;">${f(kdvHaricToplam)} ${symbol}</span>
            </div>
            <div class="d-flex justify-content-end align-items-center mb-2 border-bottom pb-2">
                <span style="font-size: 14px; color: #666; margin-right: 15px;">KDV (%20):</span>
                <span style="font-size: 16px; color: #000; font-weight: 500; min-width: 120px; text-align: right;">${f(kdvTutari)} ${symbol}</span>
            </div>
            <div class="d-flex justify-content-end align-items-center">
                <span style="font-size: 16px; color: #000; font-weight: bold; margin-right: 15px;">GENEL TOPLAM (KDV DAHİL):</span>
                <span style="font-size: 16px; color: #000; font-weight: 500; min-width: 120px; text-align: right;">${f(kdvDahilToplam)} ${symbol}</span>
            </div>
        </div>`;
 
    document.getElementById('previewBody').innerHTML = html;
    new bootstrap.Modal(document.getElementById('previewModal')).show();
}

    function importXLSX(input) {
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const wb = XLSX.read(e.target.result, { type: 'binary' });
 
                const stokSheet = wb.Sheets['ANLIK_STOK_DATA'];
                if (!stokSheet) { alert("'ANLIK_STOK_DATA' sekmesi bulunamadı!"); return; }
                const stokRows = XLSX.utils.sheet_to_json(stokSheet, { header: 1 });
 
                // Mevcut görselleri al, sonra eski verileri temizle
                const gorselMap = JSON.parse(localStorage.getItem('imes_gorsel') || '{}');
                const b64Cache = JSON.parse(localStorage.getItem('imes_gorsel_b64') || '{}');
                localStorage.removeItem('imes_katalog');
                localStorage.removeItem('imes_gorsel');
                localStorage.removeItem('imes_gorsel_b64');
 
                const seenKods = new Set();
                const newProducts = [];
                for (let r = 1; r < stokRows.length; r++) {
                    const row = stokRows[r];
                    const kod = row[0] != null ? String(row[0]).trim() : '';
                    if (!kod || seenKods.has(kod)) continue;
                    seenKods.add(kod);
                    const ad = row[1] != null ? String(row[1]).trim().toUpperCase() : '';
                    const marka = row[2] != null ? String(row[2]).trim().toUpperCase() : '';
                    const fiyat = parseFloat(String(row[6] || '0').replace(',', '.')) || 0;
                    const stok = row[9] != null ? parseFloat(row[9]) : 0;
                    const resim = gorselMap[kod] || '';
                    newProducts.push({ kod, ad, marka, fiyat, resim, stok });
                }
 
                products = newProducts;
 
                // Yeni katalog yaz
                try {
                    localStorage.setItem('imes_katalog', JSON.stringify(products.map(p => ({ kod: p.kod, ad: p.ad, marka: p.marka, fiyat: p.fiyat, stok: p.stok }))));
                } catch(e) { console.warn('imes_katalog yazılamadı:', e); }
 
                // Eski görseller varsa geri yaz (yeni görsel yüklenene kadar korunsun)
                if (Object.keys(gorselMap).length > 0) {
                    try { localStorage.setItem('imes_gorsel', JSON.stringify(gorselMap)); } catch(e) {}
                    try { localStorage.setItem('imes_gorsel_b64', JSON.stringify(b64Cache)); } catch(e) {}
                }
 
                renderProducts();
                alert(`Katalog Güncellendi! ${products.length} ürün yüklendi.`);
            } catch(err) {
                alert("Dosya okunurken hata oluştu: " + err.message);
            }
        };
        reader.readAsBinaryString(input.files[0]);
    }
 
    function importGorselCSV(input) {
        const reader = new FileReader();
        reader.onload = async e => {
            const lines = e.target.result.split(/\r?\n/);
            const gorselMap = {};
            lines.slice(1).forEach(line => {
                if (!line.trim()) return;
                const sep = line.includes(';') ? ';' : ',';
                const c = line.split(sep);
                const kod = c[0]?.trim().replace(/\r/g, '');
                const resim = c[2]?.trim().replace(/\r/g, '');
                if (kod && resim) gorselMap[kod] = resim;
            });
            // Önce eski verileri temizle
            localStorage.removeItem('imes_gorsel');
            localStorage.removeItem('imes_gorsel_b64');

            // Yeni URL map yaz
            try { localStorage.setItem('imes_gorsel', JSON.stringify(gorselMap)); } catch(e) { console.warn('imes_gorsel yazılamadı:', e); }
            products = products.map(p => ({ ...p, resim: gorselMap[p.kod] || '' }));
            renderProducts();

            // Görselleri arka planda base64'e çevir ve cache'le
            showToast("Görseller önbelleğe alınıyor...", "#3b82f6");
            const b64Map = {};
            const urls = Object.entries(gorselMap);
            await Promise.all(urls.map(async ([kod, url]) => {
                try {
                    const controller = new AbortController();
                    const timer = setTimeout(() => controller.abort(), 5000);
                    const res = await fetch(url, { signal: controller.signal });
                    clearTimeout(timer);
                    const blob = await res.blob();
                    const b64 = await new Promise(r => { const fr = new FileReader(); fr.onloadend = () => r(fr.result); fr.readAsDataURL(blob); });
                    b64Map[kod] = b64;
                } catch(e) { /* atla */ }
            }));
            try { localStorage.setItem('imes_gorsel_b64', JSON.stringify(b64Map)); } catch(e) { /* sorun değil, URL'ler zaten kayıtlı */ }
            alert(`Görseller Güncellendi! ${Object.keys(gorselMap).length} ürün görseli yüklendi. ${Object.keys(b64Map).length} görsel önbelleğe alındı.`);
        };
        reader.readAsText(input.files[0], 'windows-1254');
    }
 
    function showToast(m, c) {
        const t = document.createElement("div"); t.textContent = m;
        t.style = `position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:${c}; color:white; padding:10px 20px; border-radius:20px; z-index:10000; font-size:12px;`;
        document.body.appendChild(t); setTimeout(() => t.remove(), 1500);
    }

        getKur();

        setTimeout(onStartCacheGorseller, 2000);

    async function onStartCacheGorseller() {
        const gorselMap = JSON.parse(localStorage.getItem('imes_gorsel') || '{}');
        const b64Cache = JSON.parse(localStorage.getItem('imes_gorsel_b64') || '{}');
        const eksikler = Object.entries(gorselMap).filter(([kod]) => !b64Cache[kod]);
        if (eksikler.length === 0) return;
        let updated = false;
        for (const [kod, url] of eksikler) {
            try {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), 5000);
                const res = await fetch(url, { signal: controller.signal });
                clearTimeout(timer);
                const blob = await res.blob();
                const b64 = await new Promise(r => {
                    const fr = new FileReader();
                    fr.onloadend = () => r(fr.result);
                    fr.readAsDataURL(blob);
                });
                if (b64) { b64Cache[kod] = b64; updated = true; }
            } catch(e) { /* atla */ }
        }
        if (updated) {
            try { localStorage.setItem('imes_gorsel_b64', JSON.stringify(b64Cache)); } catch(e) {}
        }
    }
    
    function clearCatalog() { 
        if(confirm("Tüm katalog ve görseller silinecek. Emin misiniz?")) { 
            localStorage.removeItem('imes_katalog'); 
            localStorage.removeItem('imes_gorsel'); 
            localStorage.removeItem('imes_gorsel_b64'); 
            products = []; 
            renderProducts(); 
            alert("Katalog temizlendi."); 
        } 
    }
    
function newQuote() {
        if (cart.length > 0) {
            if (confirm("Mevcut teklifi temizleyip yeni bir teklif oluşturmak istediğinize emin misiniz?")) {
                cart = [];
                document.getElementById('customerName').value = "";
                document.getElementById('globalDiscountInput').value = "";
                document.getElementById('targetTotalInput').value = "";
                updateUI();
                showToast("Yeni teklif için ekran temizlendi", "#10b981");
            }
        } else {
            document.getElementById('customerName').value = "";
            showToast("Ekran temizlendi", "#3b82f6");
        }
    }
    
    function applyTargetTotal() {
    const targetInput = document.getElementById('targetTotalInput').value;
    const target = parseFloat(targetInput);
    
    if (!target || target <= 0 || cart.length === 0) {
        showToast("Lütfen geçerli bir hedef tutar girin!", "#ef4444");
        return;
    }
 
    const selectedCurr = document.getElementById('currencySelect').value;
    let rate = 1; 
    if (selectedCurr === 'TL') {
        rate = usdRate;
    } else if (selectedCurr === 'EUR') {
        rate = usdRate / eurRate;
    }
 
    const rawTotalInSelectedCurr = cart.reduce((sum, item) => {
        const listPriceInSelectedCurr = item.baseUsd * rate;
        const lineTotal = listPriceInSelectedCurr * item.qty * 1.20;
        return sum + lineTotal;
    }, 0);
 
    const calculatedDiscount = (1 - (target / rawTotalInSelectedCurr)) * 100;
 
    if (calculatedDiscount < 0) {
        showToast("Hedef fiyat liste fiyatından (indirimsiz halinden) yüksek olamaz!", "#f59e0b");
        return;
    }
 
    cart.forEach(item => {
        item.discount = parseFloat(calculatedDiscount.toFixed(8));
        item.manualPrice = null; // Hedef toplam uygulanırken elle girilen fiyatları sıfırla
    });
 
    updateUI();
    
    const symbol = selectedCurr === 'TL' ? '₺' : (selectedCurr === 'USD' ? '$' : '€');
    showToast(`Hedef ${target} ${symbol} için %${f(calculatedDiscount)} indirim uygulandı.`, "#3b82f6");
}
